name: "Phase 1 — Docker Build + Trivy Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devsecops-demo
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── 1. Unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt pytest

      - name: Run tests
        run: pytest

  # ── 2. Build image ─────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Save image to tar
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ── 3. Trivy — SECURITY GATE ───────────────────────────────────────────────
  trivy-scan:
    name: "SECURITY GATE: Trivy"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      # Filesystem scan — reports HIGH/CRITICAL in requirements.txt (non-blocking)
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/requirements.txt
          severity: HIGH,CRITICAL
          format: table
          exit-code: "0"

      # Image scan — BLOCKS pipeline on any CRITICAL CVE
      - name: Trivy image scan (BLOCKING)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  # ── 4. Summary ─────────────────────────────────────────────────────────────
  phase-1-summary:
    name: Phase 1 Summary
    runs-on: ubuntu-latest
    needs: [test, build, trivy-scan]
    if: always()
    steps:
      - name: Gate result
        run: |
          echo "## Phase 1 Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Scan | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.trivy-scan.result }}" == "failure" ]; then
            echo "**BLOCKED:** CRITICAL CVEs found. Deploy prevented." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "**PASSED:** All Phase 1 gates cleared." >> $GITHUB_STEP_SUMMARY
