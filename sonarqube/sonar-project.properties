# SonarCloud project config
# Docs: https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

sonar.projectKey=Mhdomer_devsecops-pipeline
sonar.organization=mhdomer

# Source and test paths
sonar.sources=app
sonar.tests=app/tests
sonar.inclusions=app/**/*.py
sonar.test.inclusions=app/tests/**/*.py

# Python version
sonar.python.version=3.11

# Coverage report (generated by pytest-cov in the pipeline)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
